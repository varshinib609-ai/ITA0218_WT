<!DOCTYPE html>
<html>
<body>

<p id="demo"></p>

<script>
let num = 12.34567;

document.getElementById("demo").innerHTML =
"Exponential: " + num.toExponential() + "<br>" +
"2 Decimal Places: " + num.toFixed(2) + "<br>" +
"Number to String: " + num.toString() + "<br>" +
"Negative Infinity: " + (-1/0);
</script>

</body>
</html>
