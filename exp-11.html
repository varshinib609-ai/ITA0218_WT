<!DOCTYPE html>
<html>
<head>
<style>
img{
    width:300px;
    height:200px;
}

.slide{
    display:none;
}

#s1:checked ~ .img1,
#s2:checked ~ .img2,
#s3:checked ~ .img3{
    display:block;
}
</style>
</head>
<body>

<input type="radio" name="slider" id="s1" checked>Image 1
<input type="radio" name="slider" id="s2">Image 2
<input type="radio" name="slider" id="s3">Image 3

<br><br>

<img src="img1.jpg" class="slide img1">
<img src="img2.jpg" class="slide img2">
<img src="img3.jpg" class="slide img3">

</body>
</html>
